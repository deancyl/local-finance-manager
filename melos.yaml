name: finance_app_monorepo

packages:
  - apps/**
  - packages/**

command:
  bootstrap:
    runPubGetInParallel: false
    usePubspecOverrides: true

scripts:
  analyze:
    exec: dart analyze .
  
  test:
    run: |
      melos exec --dir-exists=test -- "flutter test --coverage"
  
  # Code generation for Drift and other code generators
  generate:
    run: |
      melos exec --scope="database" -- "dart run build_runner build --delete-conflicting-outputs"
  
  build:android:
    run: |
      melos exec --scope="mobile" -- "flutter build apk --release"
  
  build:ios:
    run: |
      melos exec --scope="mobile" -- "flutter build ios --release"
  
  build:web:
    run: |
      melos exec --scope="mobile" -- "flutter build web --release"
  
  build:windows:
    run: |
      melos exec --scope="mobile" -- "flutter build windows --debug"
  
  build:macos:
    run: |
      melos exec --scope="mobile" -- "flutter build macos --debug"
  
  clean:
    run: |
      melos exec -- "flutter clean"

environment:
  sdk: '>=3.5.0 <4.0.0'
