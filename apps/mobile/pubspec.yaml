name: finance_app
description: "本地金融管家 - Local-first personal finance manager"
publish_to: 'none'
version: 0.3.202+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  archive: ^4.0.4

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  collection: ^1.18.0
  file_picker: ^8.1.4
  image_picker: ^1.1.2
  photo_view: ^0.15.0
  crypto: ^3.0.3
  pointycastle: ^3.9.0
  http: ^1.2.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.0
  csv: ^6.0.0
  pdf: ^3.10.0
  printing: ^5.12.0
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.5.2
  local_auth: ^2.3.0
  url_launcher: ^6.3.1
  speech_to_text: ^7.0.0
  image_gallery_saver: ^2.0.3
  permission_handler: ^11.3.1

  # Local packages
  core:
    path: ../../packages/core
  database:
    path: ../../packages/database
  encryption:
    path: ../../packages/encryption
  importers:
    path: ../../packages/importers
  ai:
    path: ../../packages/ai
  sync:
    path: ../../packages/sync

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.13
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/