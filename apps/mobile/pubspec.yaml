name: finance_app
description: "本地金融管家 - Local-first personal finance manager"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  collection: ^1.18.0
  file_picker: ^8.1.4
  http: ^1.2.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.0

  # Local packages
  core:
    path: ../../packages/core
  database:
    path: ../../packages/database
  encryption:
    path: ../../packages/encryption
  importers:
    path: ../../packages/importers
  # sync:  # Temporarily disabled due to PowerSync compatibility issues
  #   path: ../../packages/sync

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/