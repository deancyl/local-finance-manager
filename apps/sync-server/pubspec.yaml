name: sync_server
description: Self-hosted sync server for Local Finance Manager with E2E encryption.
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  dart_frog: ^1.2.0
  dart_frog_web_socket: ^1.0.3
  postgres: ^3.5.5
  shelf: ^1.4.2
  shelf_cors_headers: ^0.1.5
  crypto: ^3.0.6
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  logging: ^1.3.0
  dotenv: ^4.2.0
  jwt: ^2.0.0
  encryption:
    path: ../../packages/encryption

dev_dependencies:
  test: ^1.25.7
  mocktail: ^1.0.4
  dart_frog_test: ^0.1.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  lints: ^4.0.0