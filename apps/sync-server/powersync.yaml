config:
  edition: 3

streams:
  user_data:
    params:
      - SELECT request.user_id() as user_id
    queries:
      - |
        SELECT 
          id, name, account_type, parent_id,
          commodity_id, code, description, 
          is_placeholder, is_hidden, sort_order,
          created_at, updated_at, version
        FROM accounts 
        WHERE user_id = stream.user_id

      - |
        SELECT 
          id, description, post_date, enter_date,
          currency_id, reference_num, notes,
          import_batch_id, external_id, is_double_entry,
          idempotency_key, version, created_at, updated_at, deleted_at
        FROM transactions
        WHERE user_id = stream.user_id

      - |
        SELECT 
          id, transaction_id, account_id, memo,
          value_num, value_denom, quantity_num, quantity_denom,
          reconcile_state, reconcile_date, version, created_at
        FROM splits
        WHERE user_id = stream.user_id

      - |
        SELECT 
          id, name, parent_id, icon, color,
          is_income, sort_order, version, 
          created_at, updated_at, deleted_at
        FROM categories
        WHERE user_id = stream.user_id

      - |
        SELECT 
          id, name, category_id, amount_num, amount_denom,
          currency_id, period, start_date, end_date,
          is_active, version, created_at, updated_at, deleted_at
        FROM budgets
        WHERE user_id = stream.user_id

      - |
        SELECT 
          id, name, source_type, institution_id,
          account_id, config, last_import_at, 
          is_active, created_at, updated_at, version
        FROM import_sources
        WHERE user_id = stream.user_id

      - |
        SELECT 
          id, source_id, imported_at, filename,
          record_count, success_count, duplicate_count,
          error_count, status, error_details, created_at
        FROM import_batches
        WHERE user_id = stream.user_id

  shared_data:
    queries:
      - |
        SELECT 
          id, namespace, mnemonic, full_name,
          fraction, created_at, updated_at
        FROM commodities
