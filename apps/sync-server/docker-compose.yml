version: '3.8'

services:
  powersync:
    image: journeyapps/powersync-service:latest
    container_name: finance-powersync
    ports:
      - "8080:8080"
    environment:
      - POWERSYNC_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/finance_sync
      - POWERSYNC_JWT_SECRET=your-jwt-secret-key-change-in-production
      - POWERSYNC_INSTANCE_NAME=finance-sync
    depends_on:
      - postgres
    volumes:
      - ./powersync.yaml:/app/config.yaml

  postgres:
    image: postgres:15-alpine
    container_name: finance-postgres
    environment:
      - POSTGRES_DB=finance_sync
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-api
    ports:
      - "3000:3000"
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=finance_sync
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - JWT_SECRET=your-jwt-secret-key-change-in-production
      - POWERSYNC_ENDPOINT=http://powersync:8080
    depends_on:
      - postgres
      - powersync

volumes:
  postgres_data: