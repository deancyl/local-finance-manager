name: database
description: Local database layer with Drift (SQLite ORM) and SQLCipher encryption.
version: 0.1.0

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  core:
    path: ../core
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0
  uuid: ^4.5.1
  crypto: ^3.0.3
  intl: ^0.19.0
  # Encryption dependencies
  encryption:
    path: ../encryption
  sqlite3: ^2.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.22.1
  build_runner: ^2.4.13
  test: ^1.25.7
