name: sync
description: Sync client for Local Finance Manager with PowerSync and E2E encryption.
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  powersync: ^1.9.0
  path_provider: ^2.1.5
  path: ^1.9.0
  uuid: ^4.5.1
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.6
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  test: ^1.25.7